# I'm mainly in Emacs and don't use C-q (quoted-insert) that often.
set-option -g prefix C-q
unbind-key C-b

# Don't show status bar
#set -g status off

bind | split-window -h
bind - split-window -v

bind C-s set-option -g status

set -g base-index 1
set -g pane-base-index 1

set -g mouse on

# Match Solarized Dark (Ghostty + Emacs)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

set -g status-style "fg=#93a1a1,bg=#002b36"
set -g message-style "fg=#93a1a1,bg=#073642"

set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

set -g window-status-style "fg=#586e75,bg=#002b36"
set -g window-status-current-style "fg=#eee8d5,bg=#073642,bold"

# unbind r
# bind r source-file ~/.tmux.conf; display "Reloaded."
